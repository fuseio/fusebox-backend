# Default values for fusebox-backend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

accounts-service:
  enabled: true

  externalSecrets:
    secretStoreName: "external-secrets-hashicorp-vault"
    remoteRefKey: "fuseio/fusebox-backend/accounts-service"
    refreshInterval: "15s"
    secretKey:
      - mongo_uri
      - smart_wallets_jwt_secret
      - paymaster_funder_private_key
      - paymaster_funder_api_secret_key
      - amplitude_api_key
      - incoming_token_transfers_webhook_id
      - google_operator_form_url
      - operator_refresh_jwt_secret

  replicaCount: 1

  image:
    repository: 82036t6s.c1.va1.container-registry.ovh.us/fuseio/fusebox-backend/accounts-service
    pullPolicy: IfNotPresent
    tag: "latest"

  imagePullSecrets:
    - name: regcred

  nameOverride: ""
  fullnameOverride: ""

  command: []

  args: []

  serviceAccount:
    create: false
    automount: true
    annotations: {}
    name: ""

  deploymentAnnotations:
    reloader.stakater.com/auto: "true"

  podAnnotations: {}

  podLabels: {}

  podSecurityContext: {}

  securityContext: {}

  service:
    type: ClusterIP
    ports:
      - name: http
        port: 5001
        protocol: TCP
        targetPort: 5001
      - name: tcp
        port: 8875
        protocol: TCP
        targetPort: 8875

  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: accounts.qa.fuse.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: fusebox-backend-accounts-service-tls-certificate
        hosts:
          - accounts.qa.chargeweb3.com

  resources: {}

  livenessProbe:
    httpGet:
      path: /accounts/v1/health
      port: http
  readinessProbe:
    httpGet:
      path: /accounts/v1/health
      port: http

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  volumes: []

  volumeMounts: []

  configMap:
